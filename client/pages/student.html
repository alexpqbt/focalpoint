<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title></title>
    <link href="/src/style.css" rel="stylesheet">
  </head>
  <body class="bg-gray-100">
    <main class="flex min-h-screen">

      <div id="room-selection" class="flex w-full min-h-screen justify-center items-center">
        <div class ="flex flex-col w-75 h-100 border-2 rounded shadow-xl justify-center items-center gap-10">
          <h1 class="font-bold text-lg"> Available Rooms </h1>
          <h2 class=" font-semibold text-md"> Pick one to continue </h2>
          <button class="bg-blue-600 border border-black shadow-md rounded-md w-35 px-2 py-1 text-white duration-300 ease-in-out hover:bg-indigo-500  hover:scale-110" type="button" onclick="window.location.href='?room=room_1'">
            Room 1
          </button>
        </div>
      </div>

      <div id="classroom-vid" class="hidden flex-4 p-5">
        <video
          class="rounded-lg mb-2 w-full h-full bg-black"
          id="video"
          autoplay
          playsinline
          muted
        ></video>
      </div>

      <div id="classroom-chat" class="hidden flex-1 flex flex-col border-l border-gray-600 p-4 gap-4">
        <h2 class="font-bold text-lg text-center"> Is this fr chat? </h2>
        <div class="flex-1 border rounded-lg p-3 overflow-y-auto" id="chat-messages">
         
        </div>
        <input class="border rounded-lg p-2" type="text" id="chat-input" value="" placeholder="Type a message..."/>
      </div>
    </main>
    <script type="module" src="/src/student.ts"></script>
  </body>
</html>
